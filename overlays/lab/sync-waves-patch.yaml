# ============================================================
# Sync Waves Patch
# ArgoCD Sync Wave アノテーションを各リソースに付与する
#
# Wave 0: Namespace（最初に作成）
# Wave 1: MySQL PVC + Deployment + Service（DB を先に起動）
# Wave 2: WordPress PVC + Deployment + Service（アプリを最後に起動）
#
# ※ PVC は WaitForFirstConsumer (svc-latebinding) のため、
#   Deployment と同じ Wave にしないとデッドロックする
# ============================================================

# --- Wave 0: Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# --- Wave 1: PVC (MySQL) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# --- Wave 2: PVC (WordPress) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-pvc
  namespace: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
# --- Wave 1: MySQL Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# --- Wave 1: MySQL Service ---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# --- Wave 2: WordPress Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
# --- Wave 2: WordPress Service ---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: wordpress-lab
  annotations:
    argocd.argoproj.io/sync-wave: "2"
